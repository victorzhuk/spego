name: Publish npm package
run-name: Publish ${{ github.ref_name }} to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci
      - run: node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME; if (tag !== 'v' + pkg.version) throw new Error('tag ' + tag + ' does not match package version v' + pkg.version)"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm publish --access public
